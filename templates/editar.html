{% extends 'base.html' %} 

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/cadastro.css') }}" />
{% endblock extra_css%} 

{% block content %}
  <div class="container py-5 d-flex justify-content-center">
    <div class="card card-cadastro shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <div class="header-cadastro mb-4">
          <h3 class="fw-bold text-dark">Editar Medicamento</h3>
          <p class="text-muted small">
            Alterando as informações de:
            <strong>{{ remedio.nome_remedio }}</strong>
          </p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="form-medpills">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nome do Remédio</label>
              <input type="text" name="nome" class="form-control" placeholder="Ex: Dipirona"
                value="{{remedio.nome_remedio}}" required />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Princípio Ativo</label>
              <input type="text" name="principio" class="form-control" placeholder="Ex: Metamizol"
                value="{{remedio.principio_remedio}}" />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Laboratório Fabricante</label>
              <input type="text" name="lab" class="form-control" value="{{remedio.lab_remedio}}" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Categoria</label>
              <select name="categoria" class="form-select" required>
                <option value="">Selecione uma categoria</option>
                {% for categoria in categorias %}
                  <option value="{{ categoria.id_categoria }}" {% if remedio.categoria_remedio==categoria.id_categoria %}selected{% endif %}>
                    {{ categoria.nome_categoria }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Data de Fabricação</label>
              <input type="date" name="dataF" class="form-control" value="{{remedio.dataFab_remedio}}" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Data de Validade</label>
              <input type="date" name="dataV" class="form-control" value="{{remedio.dataVal_remedio}}" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Valor (R$)</label>
              <div class="input-group">
                <span class="input-group-text bg-light">R$</span>
                <input type="number" step="0.01" name="valor" class="form-control" value="{{remedio.valor_remedio}}" />
              </div>
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label">Descrição Curta</label>
              <input type="text" name="desc" class="form-control" value="{{remedio.descricao_remedio}}" />
            </div>
            <div class="col-md-12 mb-3">
              <label class="form-label">Imagem do Remédio</label>
              <input type="file" name="imagem" class="form-control" accept="image/*" />
            </div>
            {% if remedio.imagem_url %}
              <div class="col-12 mb-3">
                <img src="{{ url_for('static', filename=remedio.imagem_url) }}" alt="{{ remedio.nome_remedio }}"
                  class="img-fluid rounded" />
              </div>
            {% endif %}

            <div class="col-12 mb-4 mt-2">
              <div class="d-flex flex-wrap gap-4 p-3 bg-light rounded shadow-inner">
                <div class="form-check form-switch">
                  <input type="checkbox" name="destaque" class="form-check-input" id="destaque" {%if remedio.destaque_remedio %}checked{%endif %} />
                  <label class="form-check-label" for="destaque">Destaque</label>
                </div>
                <div class="form-check form-switch">
                  <input type="checkbox" name="lancamento" class="form-check-input" id="lancamento" {% if remedio.lancamento_remedio %}checked{%endif %} />
                  <label class="form-check-label" for="lancamento">Lançamento</label>
                </div>
                <div class="form-check form-switch">
                  <input type="checkbox" name="promo" class="form-check-input" id="promo" {%if remedio.promocao_remedio %}checked{%endif %} />
                  <label class="form-check-label" for="promo">Promoção</label>
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-save w-100 py-2 fw-bold">
              Atualizar Medicamento
            </button>
            <a href="{{ url_for('remedies.listar_remedios') }}" class="btn btn-light border w-50 py-2">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock content %}
