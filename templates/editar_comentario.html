{% extends 'base.html' %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/editar_comentario.css') }}" />
{% endblock extra_css %}

{% block content %}
<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card edit-card shadow-lg p-4 p-md-5">

        <h3 class="fw-bold mb-4 d-flex align-items-center">
          <i class="bi bi-pencil-square me-3 text-primary"></i>
          Editar Comentário
        </h3>

        <div class="mb-3">
          <small class="text-muted">Comentando como:</small>
          <div class="fw-bold">{{ comentario.usuario_nome or comentario.usuario }}</div>
        </div>

        <form method="POST">
          <div class="form-floating mb-4">
            <textarea class="form-control shadow-sm" name="texto" id="texto" style="height: 140px"
              required>{{ comentario.texto }}</textarea>
            <label for="texto">Edite seu comentário</label>
          </div>

          <div class="d-flex justify-content-between">

            <a href="{{ request.referrer or url_for('remedies.listar_remedios') }}"
              class="btn btn-outline-secondary btn-custom">
              Cancelar
            </a>

            <button type="submit" class="btn btn-primary btn-custom shadow">
              <i class="bi bi-check-circle me-2"></i>Salvar Alterações
            </button>

          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock content %}
