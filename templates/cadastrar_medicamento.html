{% extends 'base.html' %}
{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='style/cadastro.css') }}" />
{% endblock extra_css %}

{% block content %}
  <div class="container py-5 d-flex justify-content-center">
    <div class="card card-cadastro shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <div class="header-cadastro mb-4">
          <h3 class="fw-bold text-dark">Cadastrar Medicamento</h3>
          <p class="text-muted small">Preencha as informações abaixo para adicionar ao estoque.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="form-medpills">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nome do Remédio</label>
              <input type="text" name="nome" class="form-control" placeholder="Ex: Dipirona Monoidratada" required />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Princípio Ativo</label>
              <input type="text" name="principio" class="form-control" placeholder="Ex: Metamizol" required />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Laboratório Fabricante</label>
              <input type="text" name="lab" class="form-control" placeholder="Ex: Medley, EMS..." required />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Categoria</label>
              <select name="categoria" class="form-select" required>
                <option value="">Selecione uma categoria</option>
                {% for categoria in categorias %}
                  <option value="{{ categoria.id_categoria }}">
                    {{ categoria.nome_categoria }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Data de Fabricação</label>
              <input type="date" name="dataF" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Data de Validade</label>
              <input type="date" name="dataV" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Valor (R$)</label>
              <div class="input-group">
                <span class="input-group-text bg-light">R$</span>
                <input type="number" step="0.01" name="valor" class="form-control" placeholder="0,00" />
              </div>
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label">Descrição Curta</label>
              <input type="text" name="desc" class="form-control"
                placeholder="Ex: Uso adulto e pediátrico acima de 15 anos" />
            </div>
            <div class="col-md-12 mb-3">
              <label class="form-label">Imagem do Remédio</label>
              <input type="file" name="imagem" class="form-control" accept="image/*" required />
            </div>

            <div class="col-12 mb-4 mt-2">
              <div class="d-flex flex-wrap gap-4 p-3 bg-light rounded shadow-inner">
                <div class="form-check form-switch">
                  <input type="checkbox" name="destaque" class="form-check-input" id="destaque" />
                  <label class="form-check-label" for="destaque">Destaque</label>
                </div>
                <div class="form-check form-switch">
                  <input type="checkbox" name="lancamento" class="form-check-input" id="lancamento" />
                  <label class="form-check-label" for="lancamento">Lançamento</label>
                </div>
                <div class="form-check form-switch">
                  <input type="checkbox" name="promo" class="form-check-input" id="promo" />
                  <label class="form-check-label" for="promo">Promoção</label>
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-save flex-fill py-2 fw-bold">
              Salvar Medicamento
            </button>
            <a href="{{ url_for('remedies.listar_remedios') }}" class="btn btn-light border flex-fill py-2">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock content %}
